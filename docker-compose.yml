
version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gimnasio
      POSTGRES_PASSWORD: gimnasio123
      POSTGRES_DB: gimnasio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://gimnasio:gimnasio123@db:5432/gimnasio
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      NODE_ENV: development
      PORT: 3000
    depends_on:
      - db

volumes:
  postgres_data: